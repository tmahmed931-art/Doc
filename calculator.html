<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دكتور جيم | حاسبة السعرات</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="navbar">
        <div class="container navbar-container">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i class="fas fa-dumbbell"></i></div>
                <div>
                    <h1>DOCTOR <span>GYM</span></h1>
                    <p>بإدارة الكوتش بوضى</p>
                </div>
            </a>
            <nav class="nav-links">
                <a href="index.html">الرئيسية</a>
                <a href="exercises.html">التمارين</a>
                <a href="calculator.html" class="active">الحاسبة</a>
                <a href="supplements.html">المكملات</a>
                <a href="equipment.html">المعدات</a>
            </nav>
            <button class="btn-primary join-btn">انضم إلينا</button>
            <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
        </div>
        <div class="mobile-menu">
            <a href="index.html">الرئيسية</a>
            <a href="exercises.html">التمارين</a>
            <a href="calculator.html">الحاسبة</a>
            <a href="supplements.html">المكملات</a>
            <a href="equipment.html">المعدات</a>
            <button class="btn-primary">انضم إلينا</button>
        </div>
    </header>

    <main>
        <div class="container" style="padding-top: 120px;">
            <div class="section-header">
                <div class="section-badge">حاسبة السعرات الحرارية</div>
                <h2>احسب <span style="color: #d4ff00;">احتياجك اليومي</span></h2>
            </div>

            <div class="calculator-form">
                <div class="input-group">
                    <i class="fas fa-weight"></i>
                    <input type="number" id="weight" placeholder="الوزن (كجم)">
                </div>
                <div class="input-group">
                    <i class="fas fa-ruler"></i>
                    <input type="number" id="height" placeholder="الطول (سم)">
                </div>
                <div class="input-group">
                    <i class="fas fa-calendar-alt"></i>
                    <input type="number" id="age" placeholder="العمر">
                </div>
                <div class="input-group">
                    <i class="fas fa-venus-mars"></i>
                    <select id="gender">
                        <option value="male">ذكر</option>
                        <option value="female">أنثى</option>
                    </select>
                </div>
                <div class="input-group">
                    <i class="fas fa-fire"></i>
                    <select id="activity">
                        <option value="1.2">قليل الحركة (لا رياضة)</option>
                        <option value="1.375">نشاط خفيف (1-3 أيام)</option>
                        <option value="1.55">نشاط متوسط (3-5 أيام)</option>
                        <option value="1.725">نشاط عالي (6-7 أيام)</option>
                        <option value="1.9">نشاط مكثف (يومياً + عمل شاق)</option>
                    </select>
                </div>
                <button class="btn-primary" id="calcBtn" style="width: 100%;">احسب السعرات</button>
                <div id="result" class="result" style="display: none;">
                    <h3>احتياجك اليومي</h3>
                    <p class="tdee" id="tdeeValue"></p>
                    <p>للمحافظة على وزنك الحالي</p>
                    <small>معدل الأيض الأساسي (BMR): <span id="bmrValue"></span> سعرة</small>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 دكتور جيم. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
